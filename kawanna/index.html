<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura das Letras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo">
        <h1>📖 Aventura das Letras</h1>
    </header>

    <main class="conteudo">
        <section class="personagem">
            <img src="leo.png" alt="Léo, o cachorro guia" class="leo">
            <p>Olá! Eu sou o Léo 🐶. Vou te ajudar a encontrar as letras mágicas!</p>
        </section>

        <section class="acoes">
            <button id="startBtn" class="btn grande">🎮 Iniciar Aventura</button>
            <button id="comoJogar" class="btn pequeno">ℹ️ Como Jogar</button>
        </section>
    </main>

    <footer class="rodape">
        <p>Feito com ❤️ para ajudar na alfabetização</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
