<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site com Grupos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px; /* espaço entre os grupos */
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .group-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
    }

    .card {
      background: #6ec6ff;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .card:hover {
      transform: scale(1.1);
      background: #42a5f5;
    }

   .top-menu {
  display: flex;
  justify-content: center; /* centraliza os botões */
  gap: 100px; /* espaço entre os botões */
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.top-menu button {
  border: none;
  padding: 12px 25px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s ease, background-color 0.2s ease;
  color: white;
}

/* Dois primeiros botões azuis */
.btn-blue {
  background-color: #6ec1e4;
}

.btn-blue:hover {
  background-color: #4fa8d3;
  transform: scale(1.05);
}

/* Dois últimos botões laranja */
.btn-orange {
  background-color: #ffa656;
}

.btn-orange:hover {
  background-color: #ff8a33;
  transform: scale(1.05);
}

  </style>


</head>
