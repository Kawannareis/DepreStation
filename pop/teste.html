<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site com Cards Interativos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fdfdfd;
      display: flex;
    }

    /* Sidebar escondida */
    .sidebar {
      width: 200px;
      background: #6a5acd;
      height: 100vh;
      position: fixed;
      left: -180px;
      top: 0;
      transition: left 0.3s ease;
      padding: 20px;
      color: white;
    }
    .sidebar:hover {
      left: 0;
    }

    /* Conteúdo principal */
    .main {
      margin-left: 60px;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .group {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-gap: 20px;
      margin-bottom: 40px;
      justify-content: center;
    }

    .card {
      width: 120px;
      height: 120px;
      background: #ffcc70;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      color: #333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: scale(1.1);
      background: #ffd791;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Menu</h2>
    <p>Opção 1</p>
    <p>Opção 2</p>
    <p>Opção 3</p>
  </div>

  <div class="main">
    <div class="group">
      <div class="card" onclick="irParaFase(1)">Fase 1</div>
      <div class="card" onclick="irParaFase(2)">Fase 2</div>
      <div class="card" onclick="irParaFase(3)">Fase 3</div>
      <div class="card" onclick="irParaFase(4)">Fase 4</div>
      <div class="card" onclick="irParaFase(5)">Fase 5</div>
      <div class="card" onclick="irParaFase(6)">Fase 6</div>
      <div class="card" onclick="irParaFase(7)">Fase 7</div>
      <div class="card" onclick="irParaFase(8)">Fase 8</div>
      <div class="card" onclick="irParaFase(9)">Fase 9</div>
    </div>
  </div>

  <script>
    function irParaFase(fase) {
      alert("Você clicou na Fase " + fase);
   
    }
  </script>
</body>
</html>
