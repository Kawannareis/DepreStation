<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.11.3/lottie.min.js"></script>

</head>
<body>
    
    
   <div id="mascote" style="width:150px; height:150px; position: fixed; bottom:20px; right:20px;"></div>

<script>
  lottie.loadAnimation({
    container: document.getElementById('mascote'),
    renderer: 'svg',
    loop: true,
    autoplay: true,
    path: 'URL_DA_ANIMACAO_JSON'
  });
</script>


</body>
